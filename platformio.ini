; Shared settings for all Makerfabs ESP32 UWB boards
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; You will add your specific DW3000 and ESP-NOW libraries here later
lib_deps = 

; --- Build Environments ---

[env:anchor]
; Exclude all files in src, then explicitly include only anchor.cpp
build_src_filter = -<*> +<anchor.cpp>

[env:tag]
; Exclude all files in src, then explicitly include only tag.cpp
build_src_filter = -<*> +<tag.cpp>

[env:gateway]
; Exclude all files in src, then explicitly include only gateway.cpp
build_src_filter = -<*> +<gateway.cpp>